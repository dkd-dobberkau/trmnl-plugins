<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TRMNL Bayern Plugin – Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;350;375;400;450;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://trmnl.com/css/latest/plugins.css">
  <script src="https://trmnl.com/js/latest/plugins.js"></script>
  <style>
    body { background: #e8e8e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .device-frame { border: 3px solid #333; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="environment trmnl">
  <div class="device-frame">
    <div class="screen">
      <div class="view view--full">
        <div class="layout layout--col">
          <div class="columns">
            <div class="column">
              <span class="title title--small">Haben die Bayern wieder verloren?</span>

              <span class="title title--jumbo">NEIN!</span>
              <span class="label">Dortmund 2:3 Bayern</span>
              <span class="label label--small">24. Spieltag  &bull;  28.02.2026</span>

              <table class="table">
                <thead>
                  <tr>
                    <th>ST</th>
                    <th>Spiel</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>23</td>
                    <td>Bayern 3:2 Frankfurt</td>
                    <td>S</td>
                  </tr>
                  <tr>
                    <td>22</td>
                    <td>Bremen 0:3 Bayern</td>
                    <td>S</td>
                  </tr>
                  <tr>
                    <td>21</td>
                    <td>Bayern 2:0 Leipzig</td>
                    <td>S</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="title_bar">
          <img class="image" src="https://trmnl.com/images/plugins/trmnl--render.svg" />
          <span class="title">Bayern</span>
          <span class="instance">Letztes Ergebnis</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
