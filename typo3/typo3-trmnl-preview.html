<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TRMNL TYPO3 Plugin – Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;350;375;400;450;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://trmnl.com/css/latest/plugins.css">
  <script src="https://trmnl.com/js/latest/plugins.js"></script>
  <style>
    body { background: #e8e8e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .device-frame { border: 3px solid #333; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="environment trmnl">
  <div class="device-frame">
    <div class="screen">
      <div class="view view--full">
        <div class="layout layout--col">
          <div class="columns">
            <div class="column">
              <span class="title title--small">TYPO3 Releases</span>

              <table class="table">
                <thead>
                  <tr>
                    <th>Version</th>
                    <th>Maintained</th>
                    <th>ELTS</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>TYPO3 14</td>
                    <td>06/2029</td>
                    <td>06/2032</td>
                  </tr>
                  <tr>
                    <td>TYPO3 13 LTS</td>
                    <td>12/2027</td>
                    <td>12/2030</td>
                  </tr>
                  <tr>
                    <td>TYPO3 12 LTS</td>
                    <td>04/2026</td>
                    <td>04/2029</td>
                  </tr>
                  <tr>
                    <td>TYPO3 11 ELTS</td>
                    <td>10/2024</td>
                    <td>10/2027</td>
                  </tr>
                  <tr>
                    <td>TYPO3 10 ELTS</td>
                    <td>04/2023</td>
                    <td>04/2026</td>
                  </tr>
                </tbody>
              </table>

              <span class="label label--small">Quelle: get.typo3.org</span>
            </div>
          </div>
        </div>

        <div class="title_bar">
          <img class="image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40.08'%3E%3Cpath d='M29.74,27.38c-.54.16-1.11.25-1.68.24-5,0-12.45-17.64-12.45-23.5,0-2.17.51-2.89,1.23-3.5C10.67,1.34,3.26,3.62.84,6.48.23,7.47-.05,8.62,0,9.78,0,18.94,9.79,39.78,16.69,39.78c3.19,0,8.57-5.25,13-12.35'/%3E%3Cpath d='M26.52,0C32.9,0,39.29,1,39.29,4.63c0,7.31-4.64,16.16-7,16.16-4.22,0-9.47-11.73-9.47-17.6,0-2.68,1-3.19,3.71-3.19'/%3E%3C/svg%3E" />

          <span class="instance">Releases</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
